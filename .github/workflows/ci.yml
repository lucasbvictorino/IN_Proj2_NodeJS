# 1. Checkout do código
# 2. Setup do Node.js
# 3. Instalação das dependências
# 4. Execução do lint
# 5. Build da aplicação

name: CI Pipeline
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  NODE_ENV: test
  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy?schema=public"
  JWT_SECRET: "dummy-jwt-secret"
jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Cache da Engine do Prisma (otimizacao de tempo de pipeline)
      - name: Cache Prisma Engine
        uses: actions/cache@v4
        with:
          path: ~/.cache/prisma
          key: ${{ runner.os }}-prisma-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-prisma-

      # Instalando dependencias do package-lock.json
      - name: Install dependencies
        run: npm ci

      # Execucao do Linter para organizar o codigo:
      - name: Run Linter
        run: |
          npm run lint
          echo "✅ Lint passed" >> $GITHUB_STEP_SUMMARY

      # Geracao explicita do Prisma Client
      - name: Generate Prisma Client
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          npx prisma generate
          echo "✅ Prisma Client generated" >> $GITHUB_STEP_SUMMARY

      # Type checking
      - name: Type Check
        run: |
          npx tsc --noEmit
          echo "✅ Type check passed" >> $GITHUB_STEP_SUMMARY
      
      - name: Build
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          npm run build
          echo "✅ Build succeeded" >> $GITHUB_STEP_SUMMARY

      - name: Final Summary
        if: always()
        run: |
          echo "## 🧾 Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "Node.js v${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "🕒 Completed at $(date)" >> $GITHUB_STEP_SUMMARY
          # Checks the overall job status to add a success/failure icon at the top
          if [ "${{ job.status }}" == "success" ]; then
            echo "Status: 🟢 Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "Status: 🔴 Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          if [ -d build ]; then ls -lh build/ | tail -n +2 >> $GITHUB_STEP_SUMMARY; else echo "No build/ folder found (Build failed or created empty build)" >> $GITHUB_STEP_SUMMARY; fi
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY